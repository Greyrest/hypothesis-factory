# Фабрика гипотез — микросервисная раскладка.
# Смена нейронки: поменяйте LLM_PROVIDER / LLM_MODEL у сервиса llm и
# перезапустите только его — остальные сервисы не трогаются.
# Свой провайдер (не Claude/OpenAI): LLM_PROVIDER=custom + LLM_BASE_URL +
# LLM_API_KEY + LLM_MODEL — подойдёт любой OpenAI-совместимый API.
# Переменные окружения читаются из .env (см. .env.example).

x-py-health: &py-health
  healthcheck:
    test: ["CMD", "python", "-c",
           "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=3)"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 10s

services:
  ingestion:
    build: ./services/ingestion
    restart: unless-stopped
    <<: *py-health
    ports: ["8001:8000"]

  knowledge:
    build: ./services/knowledge
    restart: unless-stopped
    <<: *py-health
    environment:
      DATA_DIR: /data
    volumes:
      - "${DATA_DIR:-../Задача 1. Фабрика гипотез/Задача 1}:/data:ro"
    ports: ["8002:8000"]

  generation:
    build: ./services/generation
    restart: unless-stopped
    <<: *py-health
    environment:
      KNOWLEDGE_URL: http://knowledge:8000
      LLM_URL: http://llm:8000
    depends_on: [knowledge, llm]
    ports: ["8003:8000"]

  llm:
    build: ./services/llm
    restart: unless-stopped
    <<: *py-health
    environment:
      # anthropic | custom (любой OpenAI-совместимый API) | mock | none
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_MODEL: ${LLM_MODEL:-claude-opus-4-8}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # для LLM_PROVIDER=custom: база API и ключ вашего провайдера
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
    ports: ["8004:8000"]

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    restart: unless-stopped
    <<: *py-health
    environment:
      DATA_DIR: /data
      OUTPUT_DIR: /output
      HF_PERSIST: ${HF_PERSIST:-1}   # 0 = всё в памяти, ни одного файла
      HF_API_KEY: ${HF_API_KEY:-}    # если задан — API требует X-API-Key
      INGESTION_URL: http://ingestion:8000
      KNOWLEDGE_URL: http://knowledge:8000
      GENERATION_URL: http://generation:8000
      LLM_URL: http://llm:8000
    volumes:
      - "${DATA_DIR:-../Задача 1. Фабрика гипотез/Задача 1}:/data:ro"
      - ./output:/output
    depends_on: [ingestion, knowledge, generation]
    ports: ["8000:8000"]

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on: [gateway]
    ports: ["8088:80"]
