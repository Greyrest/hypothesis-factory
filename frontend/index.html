<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Фабрика гипотез — Норникель</title>
<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
</head>
<body>
<header>
  <h1>⚙️ Фабрика гипотез</h1>
  <p class="sub">Снижение потерь Ni/Cu с хвостами флотации — гипотезы, обоснование, приоритеты</p>
  <div class="toolbar">
    <label><input type="checkbox" id="use-llm" checked> LLM-усиление</label>
    <button id="run-btn">▶ Запустить конвейер</button>
    <span id="run-status"></span>
  </div>
</header>

<nav id="tabs"></nav>

<main id="content">
  <p class="empty">Нет результатов. Нажмите «Запустить конвейер» — gateway обойдёт
  отчёты из каталога данных (ingestion → generation → llm) и вернёт гипотезы.</p>
</main>

<script src="app.js"></script>
</body>
</html>
