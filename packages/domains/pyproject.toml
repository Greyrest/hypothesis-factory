[project]
name = "hf-domains"
version = "1.0.0"
description = "Фабрика гипотез: доменные адаптеры (mining_flotation, materials_science)"
requires-python = ">=3.10"
dependencies = [
    "hf-contracts",
    "hf-kg",
    "hf-llm",
    "networkx>=3.0",
    "openpyxl>=3.1",
    "python-docx>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hf_domains"]

[tool.uv.sources]
hf-contracts = { workspace = true }
hf-kg = { workspace = true }
hf-llm = { workspace = true }
