[project]
name = "hf-kg"
version = "1.0.0"
description = "Фабрика гипотез: универсальный движок базы знаний и графа знаний"
requires-python = ">=3.10"
dependencies = [
    "hf-contracts",
    "networkx>=3.0",
    "python-docx>=1.0",
    "openpyxl>=3.1",
    "pypdf>=4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hf_kg"]

[tool.uv.sources]
hf-contracts = { workspace = true }
