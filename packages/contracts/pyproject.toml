[project]
name = "hf-contracts"
version = "1.0.0"
description = "Фабрика гипотез: общие модели данных, перечисления и доменные константы"
requires-python = ">=3.10"
dependencies = ["pydantic>=2.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hf_contracts"]
