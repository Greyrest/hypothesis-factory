[project]
name = "hf-llm"
version = "1.0.0"
description = "Фабрика гипотез: универсальный LLM-слой (провайдеры, структурированный вывод, fallback)"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.0",
    "anthropic",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hf_llm"]
